<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Plaza Feed</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:#fff!important;display:block!important;height:auto!important;margin:0;padding:18px;font-family:-apple-system,sans-serif}
  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:14px 0 8px}
  .dsf{width:402px;max-width:100%;margin:0 auto;background:#fff;border:1px solid #ececf0;border-radius:14px;overflow:hidden;padding:14px 16px}
</style></head><body>
  <div class="dslabel">顶栏 Tabs + 筛选 pills</div>
  <div class="dsf">
    <div class="plaza-tabs-title"><span class="plaza-following">Following<i></i></span><span class="plaza-for-you">For You</span></div>
    <div class="plaza-pills" style="margin-top:10px"><span class="plaza-pill on">Explore</span><span class="plaza-pill">Social</span><span class="plaza-pill">Anonymous</span><span class="plaza-pill">Latest</span></div>
  </div>

  <div class="dslabel">Feed 卡片</div>
  <div class="dsf" style="padding:0">
    <article class="feed-card">
      <div class="feed-author">
        <img src="../assets/plaza/senja_avatar.png" alt="">
        <div><div class="feed-name">Senja</div><div class="feed-time">1 second ago</div></div>
        <button class="feed-follow">♣</button><button class="feed-more">•••</button>
      </div>
      <p class="feed-text">rindu pengen pergi...<br>mengkhayal gpp kali yaa..., siapa tahu khayalan nya jd kenyataan...Aamiin..yra</p>
      <img class="feed-photo" src="../assets/plaza/senja_kaaba.jpg" alt="">
      <div class="feed-metrics">
        <div><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#24242c" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 13.5 17.2 5.8"/><path d="M10.2 6h7.2v7.2"/><path d="M6.4 10.5c-2.5 1-3.7 3.1-3.1 5.2.7 2.2 3.1 3.1 5.4 2l2.6-1.2"/></svg></div>
        <div class="metric-mid"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#24242c" stroke-width="1.9"><circle cx="12" cy="12" r="8.2"/><path d="M8.3 10.2h7.4M8.3 13.8h4.5" stroke-linecap="round"/></svg><span>114</span></div>
        <div><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#24242c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.3 5.9c-1.7-1.9-4.5-1.8-6.1 0L12 8.2 9.8 5.9c-1.6-1.8-4.4-1.9-6.1 0-1.8 2-1.5 5 .4 6.9l7.1 6.8c.5.4 1.1.4 1.6 0l7.1-6.8c1.9-1.9 2.2-4.9.4-6.9Z"/></svg><span>1060</span></div>
      </div>
      <div class="feed-comment"><img src="../assets/plaza/santy_avatar.png" alt=""><span>Santy deman insa Allah kk</span><div class="feed-comment-like"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#24242c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.3 5.9c-1.7-1.9-4.5-1.8-6.1 0L12 8.2 9.8 5.9c-1.6-1.8-4.4-1.9-6.1 0-1.8 2-1.5 5 .4 6.9l7.1 6.8c.5.4 1.1.4 1.6 0l7.1-6.8c1.9-1.9 2.2-4.9.4-6.9Z"/></svg><span>31</span></div></div>
    </article>
  </div>
</body></html>
