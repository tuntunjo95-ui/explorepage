<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Match</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:#fff!important;display:block!important;height:auto!important;margin:0;padding:18px;font-family:-apple-system,sans-serif}
  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:14px 0 8px}
  .dsf{width:402px;max-width:100%;margin:0 auto;background:#000;border-radius:14px;overflow:hidden;padding:16px}
  .match-cards .mc-row{display:flex;gap:10px}
  .mc-half{width:calc(50% - 5px)}.mc-full{width:100%;margin-top:10px}
  .mc-half,.mc-full{border-radius:16px;display:block}
</style></head><body>
  <div class="dslabel">Radar pill + 三张匹配卡</div>
  <div class="dsf">
    <div class="radar-pill"><span class="radar-dot"></span> Radar Searching ›</div>
    <div class="match-cards" style="margin-top:14px">
      <div class="mc-row"><img class="mc-half" src="../assets/match/card_vibe.png" alt="Vibe"><img class="mc-half" src="../assets/match/card_voice.png" alt="Voice"></div>
      <img class="mc-full" src="../assets/match/card_party.png" alt="Party">
    </div>
  </div>

  <div class="dslabel">用户卡 + 换一批</div>
  <div class="dsf">
    <div class="user-card">
      <img class="um-av" src="../assets/match/fathinn.png" alt="">
      <div class="um-mid">
        <div class="um-top"><span class="um-name">fathinn</span><span class="um-sign">♋ Carpricorn</span></div>
        <div class="um-status">mau yang just friend</div>
        <div class="um-tags"><span class="um-tag">BTS</span><span class="um-tag">Ed Sheeran</span><span class="um-tag">Belajar</span></div>
      </div>
      <button class="um-chat"><svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M5.8 4.5h12.4c1.4 0 2.5 1.1 2.5 2.5v7.1c0 1.4-1.1 2.5-2.5 2.5h-5.5l-4.4 3.2c-.7.5-1.6 0-1.6-.9v-2.3h-.9c-1.4 0-2.5-1.1-2.5-2.5V7c0-1.4 1.1-2.5 2.5-2.5Z"/></svg></button>
    </div>
    <div class="user-card">
      <img class="um-av" src="../assets/match/cilaaaa.png" alt="">
      <div class="um-mid">
        <div class="um-top"><span class="um-name">cilaaaa</span><span class="um-sign">♋ Gen Z</span></div>
        <div class="um-status">Free to chat for a bit</div>
        <div class="um-tags"><span class="um-tag">Ngobrol Deep</span><span class="um-tag">Netflix-an</span><span class="um-tag">Skincare</span></div>
      </div>
      <button class="um-chat"><svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M5.8 4.5h12.4c1.4 0 2.5 1.1 2.5 2.5v7.1c0 1.4-1.1 2.5-2.5 2.5h-5.5l-4.4 3.2c-.7.5-1.6 0-1.6-.9v-2.3h-.9c-1.4 0-2.5-1.1-2.5-2.5V7c0-1.4 1.1-2.5 2.5-2.5Z"/></svg></button>
    </div>
    <div class="renew-list"><div>click to <span>renew the list</span></div><div>Times Left Today: 10</div></div>
  </div>
</body></html>
