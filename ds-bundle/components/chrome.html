<!-- @dsCard group="App Chrome" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>App Chrome</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:#fff!important;display:block!important;height:auto!important;margin:0;padding:18px;font-family:-apple-system,sans-serif}
  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:6px 0 8px}
  .frame{width:402px;max-width:100%;margin:0 auto 22px;border:1px solid #ececf0;border-radius:14px;overflow:hidden}
  .frame.light{background:#fff}
  .frame.dark{background:#15151c}
  .navframe{position:relative;width:402px;max-width:100%;height:118px;margin:0 auto;background:#ece9fb;border-radius:14px;overflow:hidden}
  .bottom-nav{bottom:26px}
</style></head><body>
  <div class="dslabel">Status bar · light</div>
  <div class="frame light">
    <div class="statusbar">
      <div class="sb-time"><span>9:41</span></div>
      <div class="sb-right">
        <svg class="sb-signal" width="22" height="15" viewBox="0 0 22 15" fill="#0b0b0f"><rect x="1.5" y="9.4" width="3.2" height="4.1" rx="1.2"/><rect x="6.7" y="7.1" width="3.2" height="6.4" rx="1.2"/><rect x="11.9" y="4.4" width="3.2" height="9.1" rx="1.2"/><rect x="17.1" y="1.5" width="3.2" height="12" rx="1.2"/></svg>
        <svg class="sb-wifi" width="18" height="14" viewBox="0 0 18 14" fill="#0b0b0f"><path d="M9 13.2 6.8 11c1.2-1.1 3.1-1.1 4.3 0L9 13.2Z"/><path d="M4.1 8.4 5.7 10c1.9-1.7 4.8-1.7 6.7 0L14 8.4c-2.8-2.4-7-2.4-9.9 0Z"/><path d="M1.5 5.5 3.1 7c3.4-3 8.4-3 11.8 0l1.6-1.5c-4.3-3.8-10.7-3.8-15 0Z"/></svg>
        <svg class="sb-battery" width="29" height="13" viewBox="0 0 29 13"><rect x="0" y="0.6" width="24" height="11.8" rx="3.7" fill="rgba(12,12,18,.42)"/><rect x="2" y="2.5" width="15" height="8" rx="2.2" fill="#34c759"/><text x="12" y="9.2" fill="#fff" font-size="7.2" font-weight="800" text-anchor="middle">90</text><rect x="25.2" y="4.4" width="2.2" height="4.2" rx="1.1" fill="rgba(12,12,18,.42)"/></svg>
      </div>
    </div>
  </div>

  <div class="dslabel">Status bar · dark (匹配/星旅/对方主页)</div>
  <div class="frame dark">
    <div class="statusbar dark">
      <div class="sb-time"><span>22:43</span>
        <svg class="sb-time-icon" width="13" height="13" viewBox="0 0 16 16" fill="#fff"><path d="M13.9 1.6 2.2 6.4c-.9.4-.8 1.7.2 1.9l4.3.9 1 4.4c.2 1 1.5 1.1 1.9.2l4.8-11.7c.2-.4-.2-.8-.5-.5Z"/></svg>
      </div>
      <div class="sb-right">
        <svg class="sb-signal" width="22" height="15" viewBox="0 0 22 15" fill="#fff"><rect x="1.5" y="9.4" width="3.2" height="4.1" rx="1.2"/><rect x="6.7" y="7.1" width="3.2" height="6.4" rx="1.2"/><rect x="11.9" y="4.4" width="3.2" height="9.1" rx="1.2"/><rect x="17.1" y="1.5" width="3.2" height="12" rx="1.2"/></svg>
        <svg class="sb-wifi" width="18" height="14" viewBox="0 0 18 14" fill="#fff"><path d="M9 13.2 6.8 11c1.2-1.1 3.1-1.1 4.3 0L9 13.2Z"/><path d="M4.1 8.4 5.7 10c1.9-1.7 4.8-1.7 6.7 0L14 8.4c-2.8-2.4-7-2.4-9.9 0Z"/><path d="M1.5 5.5 3.1 7c3.4-3 8.4-3 11.8 0l1.6-1.5c-4.3-3.8-10.7-3.8-15 0Z"/></svg>
        <svg class="sb-battery" width="29" height="13" viewBox="0 0 29 13"><rect x="0" y="0.6" width="24" height="11.8" rx="3.7" fill="rgba(255,255,255,.55)"/><rect x="2" y="2.5" width="9" height="8" rx="2.2" fill="#34c759"/><text x="12" y="9.2" fill="#fff" font-size="7.2" font-weight="800" text-anchor="middle">35</text><rect x="25.2" y="4.4" width="2.2" height="4.2" rx="1.1" fill="rgba(255,255,255,.55)"/></svg>
      </div>
    </div>
  </div>

  <div class="dslabel">Bottom nav · 🏠匹配 · 🧭广场 · ➕发帖 · 💬Message · 👤我</div>
  <div class="navframe">
    <div class="bottom-nav">
      <div class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M11.26 3.3 3.6 9.9c-.38.33-.6.8-.6 1.3V19c0 1.1.9 2 2 2h3.2v-5.2c0-.66.54-1.2 1.2-1.2h3.2c.66 0 1.2.54 1.2 1.2V21H17c1.1 0 2-.9 2-2v-7.8c0-.5-.22-.97-.6-1.3L12.74 3.3a1.13 1.13 0 0 0-1.48 0Z" fill="#c2c2cc"/></svg></div>
      <div class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.2" fill="#c2c2cc"/><path d="M16 8 13.4 13.4 8 16 10.6 10.6Z" fill="#fff"/></svg></div>
      <div class="nav-plus"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
      <div class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M5 4h14a2.4 2.4 0 0 1 2.4 2.4v7.2A2.4 2.4 0 0 1 19 16h-6.6L8 20.2c-.5.45-1.3.1-1.3-.57V16H5a2.4 2.4 0 0 1-2.4-2.4V6.4A2.4 2.4 0 0 1 5 4Z" fill="#15151c"/></svg><span class="nav-badge">1</span></div>
      <div class="nav-item nav-me"><img class="nav-avatar" src="../assets/avatars/me_nav.png" alt="me"/></div>
    </div>
    <div class="home-indicator"></div>
  </div>
</body></html>
