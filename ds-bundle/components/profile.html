<!-- @dsCard group="Profile" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Profile</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:#fff!important;display:block!important;height:auto!important;margin:0;padding:18px;font-family:-apple-system,sans-serif}
  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:14px 0 8px}
  .dsf{width:402px;max-width:100%;margin:0 auto;border:1px solid #ececf0;border-radius:14px;overflow:hidden}
  .profile-hero{position:static}
</style></head><body>
  <div class="dslabel">Hero（Aurora Zone 渐变头部）</div>
  <div class="dsf">
    <section class="profile-hero">
      <div class="profile-topline">
        <button class="zone-pill"><span class="zone-orb"></span><span>Aurora Zone</span></button>
        <div class="profile-top-actions">
          <button class="coin-btn"><span class="coin">P</span><b>0</b></button>
        </div>
      </div>
      <img class="profile-avatar" src="../assets/avatars/me.png" alt="Joxon" style="display:block;margin:6px auto">
      <div class="profile-name">Joxon</div>
      <div class="profile-id">ID: 56715146</div>
      <div class="achievement">✣ Achievement</div>
      <div class="profile-bio">Laughing with you, not at you.</div>
      <div class="profile-tags">
        <span class="tag-zodiac">♌ Leo</span><span>Sci-Fi</span><span>Action</span><span>K-Pop</span><span>Fortnite</span><span>LoL</span><span class="tag-next">›</span>
      </div>
      <div class="profile-stats"><span><b>14</b> Following</span><span><b>4</b> Followers</span><span class="visitors"><i>+28</i><b>32</b> Visitors</span></div>
      <button class="en-route">🪐 En Route ›</button>
    </section>
  </div>

  <div class="dslabel">置顶帖卡片</div>
  <div class="dsf" style="background:#fff">
    <article class="profile-post profile-post-pinned" style="padding:14px">
      <div class="pinned-meta"><span class="pin-dot">✦</span><span>Pinned</span><span>05-08 16:45</span><span class="post-views">👁 158 Views</span><span>•••</span></div>
      <div class="post-title"><b>#PenggunaBaru</b> flowers</div>
      <img class="profile-post-img bouquet" src="../assets/profile/pinned_bouquet_full.jpg" alt="" style="border-radius:14px;display:block;width:100%;margin-top:8px">
    </article>
  </div>
</body></html>
