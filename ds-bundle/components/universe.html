<!-- @dsCard group="Universe" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Universe Route</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:#fff!important;display:block!important;height:auto!important;margin:0;padding:18px;font-family:-apple-system,sans-serif}
  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:14px 0 8px}
  .dsf{width:402px;max-width:100%;margin:0 auto;background:#0b0926 center/cover;border:1px solid #ececf0;border-radius:14px;overflow:hidden;padding:18px;color:#fff}
  .planet,.uni-capsule{position:static!important;top:auto!important}
  .pl-grid{display:flex;justify-content:space-around;align-items:flex-end;gap:8px;text-align:center}
  .pl-grid figure{margin:0}.pl-grid img{display:block;margin:0 auto}
  .pl-grid figcaption{font-size:10px;color:#c9c6e6;margin-top:6px}
  .pl-grid figcaption b{display:block;color:#fff;font-size:11px}
  .cap-pods img{width:34px;height:34px;border-radius:50%;object-fit:cover}
</style></head><body>
  <div class="dslabel">四里程碑星球（天数越大越远越高）</div>
  <div class="dsf" style="background-image:url(../assets/universe/starfield.jpg)">
    <div class="pl-grid">
      <figure><img src="../assets/universe/flicker.png" width="74" alt=""><figcaption><b>Flicker</b>7天 · 178,879</figcaption></figure>
      <figure><img src="../assets/universe/echo.png" width="66" alt=""><figcaption><b>Echo</b>30天 · 12,864</figcaption></figure>
      <figure><img src="../assets/universe/bend.png" width="86" alt=""><figcaption><b>Bend</b>120天 · 0</figcaption></figure>
      <figure><img src="../assets/universe/eternal.png" width="60" alt=""><figcaption><b>Eternal</b>365天 · 0</figcaption></figure>
    </div>
  </div>

  <div class="dslabel">双人头像舱 + Day 进度 + Memory</div>
  <div class="dsf" style="background-image:url(../assets/universe/starfield.jpg);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
    <div class="uni-capsule"><div class="cap-pods"><img src="../assets/avatars/me_nav.png" alt=""><img src="../assets/avatars/hhhhll.png" alt=""></div><div class="cap-base"></div></div>
    <div class="uni-day"><span class="d-pre">Day</span> <span class="d-num">2</span> <span class="d-sl">/</span> <span class="d-tot">7</span></div>
    <div class="uni-memory">. Memory <span>✦</span> ➤➤</div>
  </div>
</body></html>
