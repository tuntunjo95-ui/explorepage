<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Star Light & Recall</title>
<link rel="stylesheet" href="../styles.css">
<style>

  .dslabel{font:700 11px/1 -apple-system;letter-spacing:.05em;text-transform:uppercase;color:#9a9aa6;margin:14px 0 8px}
  .dsf{width:402px;max-width:100%;margin:0 auto;background:#fff;border:1px solid #ececf0;border-radius:14px;overflow:hidden;padding:10px 0}

</style></head><body>
  <div class="dslabel">Continue The Journey · 召回卡（堆叠卡组）</div>

    <div class="cj-starlight full">
      <div class="sl-title">⭐ Star Light</div>

        <div class="sl-item"><div class="sl-av"><img src="../assets/avatars/hhhhll.png" alt=""><span class="av-count">3</span></div><span>Bessie</span></div>

        <div class="sl-item"><div class="sl-av"><img src="../assets/avatars/calista.png" alt=""><span class="av-dot"></span></div><span>Nana</span></div>
        <div class="sl-item"><div class="sl-more">›</div><span>More</span></div>
      </div>
    </div>
  </div>
